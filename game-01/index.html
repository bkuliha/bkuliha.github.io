<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>game-01 | Catch 20</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="game-shell">
    <header class="hero">
      <p class="eyebrow">game-01</p>
      <h1>Catch 20</h1>
      <p class="subtitle">
        Click the moving target twenty times before the timer runs out.
      </p>
    </header>

    <section class="hud" aria-label="Game status">
      <div class="stat">
        <span class="label">Score</span>
        <strong id="score">0</strong>
      </div>
      <div class="stat">
        <span class="label">Time</span>
        <strong id="time">30</strong>
      </div>
      <button id="startButton" class="start-button" type="button">Start game</button>
    </section>

    <section class="arena-wrap">
      <div id="arena" class="arena" aria-label="Game arena">
        <button id="target" class="target" type="button" aria-label="Target"></button>
        <p id="message" class="message">Press Start game to begin.</p>
      </div>
    </section>

    <section class="instructions">
      <p>
        This page is designed for GitHub Pages testing: all assets are relative, static, and
        iframe-safe.
      </p>
    </section>
  </main>

  <script src="./game.js"></script>
</body>
</html>
